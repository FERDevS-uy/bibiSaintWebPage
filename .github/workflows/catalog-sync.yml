name: Catalog Sync

on:
  schedule:
    # Aproximacion quincenal: dia 1 y 16 de cada mes, 04:00 UTC
    - cron: "0 4 1,16 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: catalog-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-catalog:
    runs-on: ubuntu-latest
    environment: production
    env:
      USER_EMAIL: ${{ secrets.NUVEX_USER_EMAIL }}
      USER_PASS: ${{ secrets.NUVEX_USER_PASS }}
      ENABLE_EMAIL_NOTIFICATIONS: ${{ vars.ENABLE_EMAIL_NOTIFICATIONS || 'false' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: webScrappingTool/pnpm-lock.yaml

      - name: Install scraper dependencies
        run: pnpm --dir webScrappingTool install --frozen-lockfile

      - name: Run providers scraper
        run: pnpm --dir webScrappingTool run dev

      - name: Validate generated catalog file
        run: |
          if [[ ! -f "code/src/data/productos.csv" ]]; then
            echo "No se encontro code/src/data/productos.csv" >&2
            exit 1
          fi
          ROWS=$(wc -l < code/src/data/productos.csv)
          if [[ "$ROWS" -lt 2 ]]; then
            echo "El catalogo generado no tiene filas de datos" >&2
            exit 1
          fi
          echo "Filas en catalogo: $ROWS"

      - name: Commit and push updated catalog
        run: |
          if git diff --quiet -- code/src/data/productos.csv; then
            echo "Sin cambios en catalogo. No se crea commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add code/src/data/productos.csv
          git commit -m "chore(catalog): sync proveedores"
          git push

      - name: Notify by email
        if: always() && env.ENABLE_EMAIL_NOTIFICATIONS == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
          RUN_STATUS: ${{ job.status }}
        run: |
          if [[ -z "$RESEND_API_KEY" || -z "$RESEND_FROM_EMAIL" || -z "$RESEND_TO_EMAIL" ]]; then
            echo "Notificacion por correo omitida: faltan secretos RESEND_API_KEY, RESEND_FROM_EMAIL o RESEND_TO_EMAIL"
            exit 0
          fi

          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          SUBJECT="[Catalog Sync] ${RUN_STATUS} - ${GITHUB_REPOSITORY}"
          HTML="<p>Resultado del workflow <strong>Catalog Sync</strong>: <strong>${RUN_STATUS}</strong>.</p><p><a href='${RUN_URL}'>Ver ejecucion</a></p>"

          curl -sS --fail https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"${RESEND_FROM_EMAIL}\",\"to\":[\"${RESEND_TO_EMAIL}\"],\"subject\":\"${SUBJECT}\",\"html\":\"${HTML}\"}" \
          && echo "Correo de notificacion enviado" \
          || echo "No se pudo enviar correo de notificacion"