name: Catalog Validate (Reusable)

on:
  workflow_call:
    inputs:
      catalog_drop_threshold_percent:
        type: number
        required: false
        default: 35
      provider_drop_threshold_percent:
        type: number
        required: false
        default: 50
      provider_drop_min_base_rows:
        type: number
        required: false
        default: 20
      use_staging_csv:
        type: boolean
        required: false
        default: false
      staging_csv_path:
        type: string
        required: false
        default: webScrappingTool/data/result.csv
      publish_validated_catalog_artifact:
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  validate-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Snapshot active catalog CSV
        run: |
          mkdir -p _catalog_backups
          cp code/src/data/productos.csv _catalog_backups/productos-${{ github.run_id }}-${{ github.run_attempt }}.csv

      - name: Upload active catalog snapshot
        uses: actions/upload-artifact@v4
        with:
          name: catalog-active-backup
          path: _catalog_backups/*.csv

      - name: Select CSV candidate source
        run: |
          if [[ "${{ inputs.use_staging_csv }}" == "true" ]]; then
            CANDIDATE="${{ inputs.staging_csv_path }}"
            if [[ -f "$CANDIDATE" ]]; then
              echo "CATALOG_CSV_PATH=$CANDIDATE" >> "$GITHUB_ENV"
              echo "CATALOG_SOURCE_KIND=staging" >> "$GITHUB_ENV"
              echo "Using staging CSV: $CANDIDATE"
            else
              echo "CATALOG_CSV_PATH=code/src/data/productos.csv" >> "$GITHUB_ENV"
              echo "CATALOG_SOURCE_KIND=active-fallback" >> "$GITHUB_ENV"
              echo "Staging CSV not found at $CANDIDATE. Falling back to active catalog."
            fi
          else
            echo "CATALOG_CSV_PATH=code/src/data/productos.csv" >> "$GITHUB_ENV"
            echo "CATALOG_SOURCE_KIND=active" >> "$GITHUB_ENV"
          fi

      - name: Validate catalog CSV integrity
        env:
          CATALOG_DROP_THRESHOLD_PERCENT: ${{ inputs.catalog_drop_threshold_percent }}
          PROVIDER_DROP_THRESHOLD_PERCENT: ${{ inputs.provider_drop_threshold_percent }}
          PROVIDER_DROP_MIN_BASE_ROWS: ${{ inputs.provider_drop_min_base_rows }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          const targetCsvPath = path.resolve(process.cwd(), 'code/src/data/productos.csv');
          const csvPath = path.resolve(process.cwd(), process.env.CATALOG_CSV_PATH || 'code/src/data/productos.csv');
          const csvSourceKind = process.env.CATALOG_SOURCE_KIND || 'active';

          if (!fs.existsSync(targetCsvPath)) {
            console.error('Missing active catalog file at code/src/data/productos.csv');
            process.exit(1);
          }

          if (!fs.existsSync(csvPath)) {
            console.error(`Missing selected catalog file at ${csvPath}`);
            process.exit(1);
          }

          const csv = fs.readFileSync(csvPath, 'utf8');
          if (!csv.trim()) {
            console.error('Catalog CSV is empty.');
            process.exit(1);
          }

          const report = {
            timestamp: new Date().toISOString(),
            file: csvPath,
            sourceKind: csvSourceKind,
            summary: {},
            providerCounts: { current: {}, previous: {} },
            warnings: [],
            errors: [],
          };

          function parseCsv(text) {
            const rows = [];
            let row = [];
            let cell = '';
            let i = 0;
            let inQuotes = false;

            while (i < text.length) {
              const ch = text[i];

              if (inQuotes) {
                if (ch === '"' && text[i + 1] === '"') {
                  cell += '"';
                  i += 2;
                  continue;
                }
                if (ch === '"') {
                  inQuotes = false;
                  i += 1;
                  continue;
                }
                cell += ch;
                i += 1;
                continue;
              }

              if (ch === '"') {
                inQuotes = true;
                i += 1;
                continue;
              }

              if (ch === ',') {
                row.push(cell);
                cell = '';
                i += 1;
                continue;
              }

              if (ch === '\n') {
                row.push(cell);
                rows.push(row);
                row = [];
                cell = '';
                i += 1;
                continue;
              }

              if (ch === '\r') {
                i += 1;
                continue;
              }

              cell += ch;
              i += 1;
            }

            if (cell.length > 0 || row.length > 0) {
              row.push(cell);
              rows.push(row);
            }

            return rows;
          }

          const rows = parseCsv(csv).filter((r) => r.some((c) => String(c).trim() !== ''));
          if (rows.length < 2) {
            console.error('Catalog CSV has no data rows.');
            process.exit(1);
          }

          function getDataRowsCountFromCsv(text) {
            const parsed = parseCsv(text).filter((r) => r.some((c) => String(c).trim() !== ''));
            return Math.max(parsed.length - 1, 0);
          }

          function inferProvider(row, indexMap) {
            const id = String(row[indexMap.id] ?? '').trim().toLowerCase();
            const image = String(row[indexMap.imagen] ?? '').trim().toLowerCase();
            const link = String(row[indexMap.linkPago] ?? '').trim().toLowerCase();

            if (id.startsWith('mdt-') || image.includes('martinaditrento.com')) return 'martinaditrento';
            if (id.startsWith('kai-') || link.includes('kaideco.uy') || image.includes('cdn.shopify.com')) return 'kaideco';
            if (image.includes('nuvex.uy') || link.includes('nuvex.uy')) return 'nuvex';
            return 'otros';
          }

          const headers = rows[0].map((h) => String(h).trim());
          const requiredHeaders = ['id', 'name', 'precio', 'imagen', 'categorias'];
          const missingHeaders = requiredHeaders.filter((h) => !headers.includes(h));
          if (missingHeaders.length > 0) {
            console.error(`Missing required CSV headers: ${missingHeaders.join(', ')}`);
            process.exit(1);
          }

          const idx = Object.fromEntries(headers.map((h, n) => [h, n]));
          const ids = new Set();
          const errors = [];
          const providerCountsCurrent = new Map();

          for (let line = 1; line < rows.length; line += 1) {
            const row = rows[line];
            const rowNum = line + 1;
            const id = String(row[idx.id] ?? '').trim();
            const name = String(row[idx.name] ?? '').trim();
            const price = String(row[idx.precio] ?? '').trim();
            const image = String(row[idx.imagen] ?? '').trim();
            const category = String(row[idx.categorias] ?? '').trim();

            if (!id) errors.push(`Row ${rowNum}: missing id`);
            if (!name) errors.push(`Row ${rowNum}: missing name`);
            if (!price) errors.push(`Row ${rowNum}: missing precio`);
            if (!image) errors.push(`Row ${rowNum}: missing imagen`);
            if (!category) errors.push(`Row ${rowNum}: missing categorias`);

            if (id) {
              if (ids.has(id)) {
                errors.push(`Row ${rowNum}: duplicate id '${id}'`);
              } else {
                ids.add(id);
              }
            }

            const provider = inferProvider(row, idx);
            providerCountsCurrent.set(provider, (providerCountsCurrent.get(provider) || 0) + 1);
          }

          if (errors.length > 0) {
            console.error('CSV validation failed:');
            errors.slice(0, 50).forEach((e) => console.error(`- ${e}`));
            if (errors.length > 50) {
              console.error(`- ... and ${errors.length - 50} more errors`);
            }
            report.errors = errors;
            report.summary = {
              rowsCurrent: rows.length - 1,
              uniqueIds: ids.size,
            };
            report.providerCounts.current = Object.fromEntries(providerCountsCurrent);
            fs.writeFileSync('validation-report.json', JSON.stringify(report, null, 2));
            process.exit(1);
          }

          const currentCount = rows.length - 1;
          const thresholdPercent = Number(process.env.CATALOG_DROP_THRESHOLD_PERCENT || '35');
          const providerThresholdPercent = Number(process.env.PROVIDER_DROP_THRESHOLD_PERCENT || '50');
          const expectedProviders = ['nuvex', 'kaideco', 'martinaditrento'];

          report.providerCounts.current = Object.fromEntries(providerCountsCurrent);

          // Regla principal: solo fallar si algún proveedor esperado trae 0 productos.
          for (const provider of expectedProviders) {
            const currValue = providerCountsCurrent.get(provider) || 0;
            if (currValue === 0) {
              report.errors.push(`Provider ${provider} returned 0 products`);
            }
          }

          try {
            const previousCsv = execSync('git show HEAD~1:code/src/data/productos.csv', {
              stdio: ['ignore', 'pipe', 'pipe'],
              encoding: 'utf8',
            });

            const previousCount = getDataRowsCountFromCsv(previousCsv);
            const previousRows = parseCsv(previousCsv).filter((r) => r.some((c) => String(c).trim() !== ''));
            const previousHeaders = (previousRows[0] || []).map((h) => String(h).trim());
            const previousIdx = Object.fromEntries(previousHeaders.map((h, n) => [h, n]));
            const providerCountsPrevious = new Map();
            for (let line = 1; line < previousRows.length; line += 1) {
              const row = previousRows[line];
              const provider = inferProvider(row, previousIdx);
              providerCountsPrevious.set(provider, (providerCountsPrevious.get(provider) || 0) + 1);
            }

            report.providerCounts.current = Object.fromEntries(providerCountsCurrent);
            report.providerCounts.previous = Object.fromEntries(providerCountsPrevious);

            if (previousCount > 0) {
              const dropPercent = ((previousCount - currentCount) / previousCount) * 100;
              console.log(`Catalog rows previous=${previousCount}, current=${currentCount}, drop=${dropPercent.toFixed(2)}%`);

              if (dropPercent > thresholdPercent) {
                const msg = `Catalog drop ${dropPercent.toFixed(2)}% exceeds threshold ${thresholdPercent}% (allowed by policy; only zero-provider fails).`;
                console.warn(msg);
                report.warnings.push(msg);
              }

              for (const [provider, prevValue] of providerCountsPrevious.entries()) {
                const currValue = providerCountsCurrent.get(provider) || 0;
                const providerDrop = ((prevValue - currValue) / prevValue) * 100;
                console.log(
                  `Provider ${provider}: previous=${prevValue}, current=${currValue}, drop=${providerDrop.toFixed(2)}%`
                );
                if (providerDrop > providerThresholdPercent) {
                  const msg = `Provider ${provider} drop ${providerDrop.toFixed(2)}% exceeds threshold ${providerThresholdPercent}% (allowed by policy; only zero-provider fails).`;
                  console.warn(msg);
                  report.warnings.push(msg);
                }
              }
            } else {
              console.log('Previous catalog has 0 rows; anomaly drop gate skipped.');
              report.warnings.push('Previous catalog has 0 rows; anomaly drop gate skipped.');
            }
          } catch (err) {
            console.log('Previous catalog snapshot not available; anomaly drop gate skipped.');
            report.warnings.push('Previous catalog snapshot not available; anomaly drop gate skipped.');
          }

          if (report.errors.length > 0) {
            console.error('CSV validation failed:');
            report.errors.forEach((e) => console.error(`- ${e}`));
            report.summary = {
              rowsCurrent: currentCount,
              uniqueIds: ids.size,
            };
            fs.writeFileSync('validation-report.json', JSON.stringify(report, null, 2));
            process.exit(1);
          }

          console.log(`CSV validation OK. Rows: ${currentCount}, Unique IDs: ${ids.size}`);
          report.summary = {
            rowsCurrent: currentCount,
            uniqueIds: ids.size,
          };
          report.providerCounts.current = Object.fromEntries(providerCountsCurrent);

          fs.mkdirSync('catalog-promoted', { recursive: true });
          fs.copyFileSync(csvPath, 'catalog-promoted/productos.csv');

          fs.writeFileSync('validation-report.json', JSON.stringify(report, null, 2));
          EOF

      - name: Upload catalog validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catalog-validation-report
          path: validation-report.json
          if-no-files-found: ignore

      - name: Upload promoted catalog artifact
        if: ${{ inputs.publish_validated_catalog_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: validated-catalog-csv
          path: catalog-promoted/productos.csv
          if-no-files-found: error
